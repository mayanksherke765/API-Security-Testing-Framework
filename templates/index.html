<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Security Scanner</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🔐 API Security Testing Framework</h1>

            <p class="subtitle">
                Advanced API Vulnerability Scanner
            </p>

            <form action="/scan" method="POST">

                <input
                    type="text"
                    name="api_url"
                    placeholder="Enter API URL..."
                    required
                >

                <button type="submit">
                    Scan API
                </button>

            </form>

        </div>

    </div>

</body>

</html>
